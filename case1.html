<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Case 1 可直接註冊 — RideLife</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&family=Overpass:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="gid-shell.css">
</head>
<body>
  <div class="screen" data-nav="garage">
    <header class="page-head">
      <div class="chev" role="button" aria-label="back"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3 5 8l5 5" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div><h1>Add Product</h1><p>Serial No. 2948 2441 3743</p></div>
    </header>
    <main class="content">
      <div class="card result">
        <div class="badge ok">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#0050FC" stroke-width="1.8"/><path d="M7.5 12.5l3 3 6-6.5" stroke="#0050FC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <h2>車架驗證成功</h2>
        <p>此車架尚未被任何 GID 帳號註冊，舊保卡資料庫中也查無資料，可直接進行全新註冊。</p>
      </div>

      <div class="card">
        <div class="kv"><span>Model</span><span>TCR Advanced SL</span></div>
        <div class="kv"><span>Frame No.</span><span>2948 2441 3743</span></div>
        <div class="kv"><span>Status</span><span style="color:#0050FC">可註冊</span></div>
      </div>

      <div class="cta">
        <button class="btn btn-primary">繼續註冊</button>
      </div>
    </main>
  </div>
  <script src="gid-shell.js"></script>
</body>
</html>
