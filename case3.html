<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<title>Case 3 找到舊保卡資料 — RideLife</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

</head>
<body>
  <div class="screen" data-nav="garage">
    <header class="page-head">
      <div class="chev" role="button" aria-label="back"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3 5 8l5 5" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div><h1>Add Product</h1><p>Serial No. 2948 2441 3743</p></div>
    </header>
    <main class="content">
      <div class="infobox">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" style="flex:none;margin-top:2px;"><circle cx="9" cy="9" r="8" stroke="#0050FC" stroke-width="1.45"/><path d="M9 8v4" stroke="#0050FC" stroke-width="1.45" stroke-linecap="round"/><circle cx="9" cy="5.5" r=".9" fill="#0050FC"/></svg>
        <div class="txt">
          <h3>找到舊保卡資料</h3>
          <p>此車架尚未在 GID 註冊，但我們在舊保卡資料庫找到對應資料。確認以下資訊後即可領用註冊。</p>
        </div>
      </div>

      <div class="card">
        <h2>舊保卡資料</h2>
        <div class="kv"><span>Model</span><span>TCR Advanced SL</span></div>
        <div class="kv"><span>車主</span><span>王＊＊</span></div>
        <div class="kv"><span>購買日期</span><span>2021-08-14</span></div>
        <div class="kv"><span>經銷商</span><span>捷安特 ＊＊店</span></div>
      </div>

      <div class="cta">
        <button class="btn btn-primary">這是我的車，領用此資料</button>
      </div>
    </main>
  </div>
  <script src="gid-shell.js"></script>
