<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Verify Code — RideLife</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&family=Overpass:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="gid-shell.css">
<style>
  .find-stepper {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; padding: 8px 16px 0; flex-shrink: 0;
  }
  .find-step {
    width: 24px; height: 24px; border-radius: 50%;
    background: #BCBCBC;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Overpass', sans-serif; font-weight: 800;
    font-size: 14px; color: #fff;
  }
  .find-step.active { background: #58626E; }
  .find-step-arrow { width: 16px; height: 16px; display: flex; align-items: center; }

  .find-card {
    background: #fff; border-radius: 4px;
    box-shadow: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -4px rgba(0,0,0,.1);
    padding: 16px; display: flex; flex-direction: column; gap: 16px;
    width: 100%; flex-shrink: 0;
  }
  .find-card h2 {
    font-family: 'Overpass', sans-serif; font-weight: 700;
    font-size: 20px; line-height: 24px; color: #000;
  }

  .fp-field { display: flex; flex-direction: column; gap: 4px; }
  .fp-label {
    display: flex; align-items: center; gap: 7px;
    font-family: 'Open Sans', sans-serif; font-weight: 700;
    font-size: 14px; line-height: 20px; color: #000;
  }
  .fp-label .req { color: #C83317; font-size: 12px; }
  .fp-input {
    width: 100%; height: 32px;
    border: 1px solid #DEDEE0; background: #fff;
    padding: 0 10px;
    font-family: 'Open Sans', sans-serif; font-size: 12px;
    color: #000; outline: none; box-sizing: border-box;
  }
  .fp-input:focus { border-color: #0050FC; }
  .fp-input.error { border-color: #C83317; }
  .fp-hint { font-family: 'Open Sans', sans-serif; font-size: 12px; line-height: 16px; letter-spacing: .02em; color: #58626E; }

  .resend {
    font-family: 'Open Sans', sans-serif; font-weight: 600;
    font-size: 12px; line-height: 16px; letter-spacing: .02em;
    color: #000; cursor: default;
  }
  .resend.ready { color: #0050FC; cursor: pointer; }
</style>
</head>
<body>

  <div class="screen" data-nav="garage">

    <header class="page-head">
      <div class="chev" role="button" aria-label="back" data-back-url="find-products.html">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3 5 8l5 5" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div>
        <h1>Find your products</h1>
        <p>Verify your email to link them to your account</p>
      </div>
    </header>

    <main class="content" style="gap:24px;">

      <div class="find-stepper">
        <div class="find-step">1</div>
        <div class="find-step-arrow"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="#BCBCBC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="find-step active">2</div>
        <div class="find-step-arrow"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="#BCBCBC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="find-step">3</div>
      </div>

      <div class="find-card">
        <h2>Enter verification code</h2>
        <div class="fp-field">
          <div class="fp-label">Verify code <span class="req">*</span></div>
          <input id="code-input" class="fp-input" type="tel" inputmode="numeric" pattern="[0-9]*" placeholder="Enter the 6-digit code" maxlength="6" autocomplete="one-time-code">
          <p id="code-hint" class="fp-hint">We sent a code to <strong id="email-display"></strong>.</p>
        </div>
        <span id="resend-text" class="resend">Resend (59s)</span>
      </div>

      <div class="cta">
        <button class="btn btn-outline" data-back-url="garage.html">Cancel</button>
        <button class="btn btn-primary" id="next-btn">Next</button>
      </div>

    </main>

  </div>

  <script src="gid-shell.js"></script>
  <script>
    // 顯示 email
    var email = sessionStorage.getItem('gid_verify_email') || '';
    document.getElementById('email-display').textContent = email;

    // autofocus
    window.addEventListener('load', function () {
      document.getElementById('code-input').focus();
    });

    // 59s 倒數
    var seconds = 59;
    var resendEl = document.getElementById('resend-text');
    var timer = setInterval(function () {
      seconds--;
      if (seconds <= 0) {
        clearInterval(timer);
        resendEl.textContent = 'Resend';
        resendEl.classList.add('ready');
      } else {
        resendEl.textContent = 'Resend (' + seconds + 's)';
      }
    }, 1000);

    // Resend click（倒數結束後才可按）
    resendEl.addEventListener('click', function () {
      if (!resendEl.classList.contains('ready')) return;
      resendEl.classList.remove('ready');
      seconds = 59;
      resendEl.textContent = 'Resend (59s)';
      timer = setInterval(function () {
        seconds--;
        if (seconds <= 0) {
          clearInterval(timer);
          resendEl.textContent = 'Resend';
          resendEl.classList.add('ready');
        } else {
          resendEl.textContent = 'Resend (' + seconds + 's)';
        }
      }, 1000);
    });

    // Next 驗證
    var codeInp  = document.getElementById('code-input');
    var codeHint = document.getElementById('code-hint');
    var emailEl  = document.getElementById('email-display');

    function restoreHint() {
      codeHint.innerHTML = 'We sent a code to <strong>' + (sessionStorage.getItem('gid_verify_email') || '') + '</strong>.';
      codeHint.style.color = '';
      codeInp.classList.remove('error');
    }

    codeInp.addEventListener('input', restoreHint);

    document.getElementById('next-btn').addEventListener('click', function () {
      var val = codeInp.value.trim();

      if (val.length < 6) {
        codeHint.textContent = 'Please enter the 6-digit verification code.';
        codeHint.style.color = '#C83317';
        codeInp.classList.add('error');
        return;
      }

      // Case 6: verification failure
      if (sessionStorage.getItem('gid_find_case') === '6') {
        codeHint.textContent = 'Incorrect code. Please try again.';
        codeHint.style.color = '#C83317';
        codeInp.classList.add('error');
        return;
      }

      var dest = sessionStorage.getItem('gid_find_case') === '5'
        ? 'no-products.html'
        : 'select-products.html';
      setTimeout(function () { location.href = dest; }, 0);
    });
  </script>
</body>
</html>
