<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Case 4–6 我有舊保卡資料 — RideLife</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&family=Overpass:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="gid-shell.css">
</head>
<body>
  <div class="screen" data-nav="garage">
    <header class="page-head">
      <div class="chev" role="button" aria-label="back"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3 5 8l5 5" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div><h1>找回舊保卡資料</h1><p>用你的舊保卡資訊搜尋既有紀錄</p></div>
    </header>
    <main class="content">
      <div class="infobox">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" style="flex:none;margin-top:2px;"><circle cx="9" cy="9" r="8" stroke="#0050FC" stroke-width="1.45"/><path d="M9 8v4" stroke="#0050FC" stroke-width="1.45" stroke-linecap="round"/><circle cx="9" cy="5.5" r=".9" fill="#0050FC"/></svg>
        <div class="txt">
          <h3>我在舊保卡系統有資料</h3>
          <p>輸入購買時登記的資訊，協助我們找到並比對你的舊保卡紀錄。</p>
        </div>
      </div>

      <div class="card">
        <h2>搜尋舊保卡</h2>
        <div class="input"><input type="text" placeholder="手機號碼"></div>
        <div class="input"><input type="text" placeholder="購買時的姓名"></div>
        <p class="helper">我們會以手機號碼與姓名比對舊保卡資料庫。</p>
        <div class="cta">
          <button class="btn btn-primary">搜尋紀錄</button>
        </div>
      </div>
    </main>
  </div>
  <script src="gid-shell.js"></script>
</body>
</html>
